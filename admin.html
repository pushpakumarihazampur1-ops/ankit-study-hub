<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - Ankit Study Hub</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
box-sizing:border-box;
}

button{
width:100%;
padding:10px;
background:#007BFF;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

#msg{
margin-top:15px;
color:red;
}
</style>
</head>

<body>

<div class="box">
<h2>Admin Login</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="msg"></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getAuth, signInWithEmailAndPassword }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyCVjEuZ_RZkyLdgPEsSAZPHeZZplDgsiPs",
authDomain: "study-website-d09ec.firebaseapp.com",
projectId: "study-website-d09ec",
storageBucket: "study-website-d09ec.firebasestorage.app",
messagingSenderId: "108295643821",
appId: "1:108295643821:web:188bc7921fc10c779c9c24",
measurementId: "G-0SZYDPLP88"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){

const email=document.getElementById("email").value;

const password=document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)

.then(()=>{

window.location.href = "dashboard.html";

})

.catch(()=>{

document.getElementById("msg").innerHTML="Wrong Email or Password";

});

}

</script>

</body>
</html>
