<style>
*{
margin:0;
padding:0;
box-sizing:border-box;

body{

background:#0d6efd;

.classes{
display:grid;

.card{
background:white;
padding:20px;
text-align:center;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,.15);

.card h3{
margin-bottom:10px;

footer{
background:#0d6efd;
